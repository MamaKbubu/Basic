<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Path Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 80px;
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #6a0dad;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #540b9e;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #6a0dad;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Life Path Calculator</h2>

        <div>
            <input type="number" id="day" placeholder="Day">
            <input type="number" id="month" placeholder="Month">
            <input type="number" id="year" placeholder="Year">
        </div>

        <button onclick="calculateLifePath()">
            Calculate
        </button>

        <div id="result"></div>
    </div>

    <script>
        function reduceNumber(num) {

            // Keep master numbers
            while (num > 9 && num !== 11 && num !== 22 && num !== 33) {

                let sum = 0;

                // Convert number to string and add digits
                num.toString().split('').forEach(digit => {
                    sum += Number(digit);
                });

                num = sum;
            }

            return num;
        }

        function calculateLifePath() {

            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;

            if (!day || !month || !year) {
                document.getElementById('result').innerHTML =
                    "Please fill all fields";
                return;
            }

            // Combine all digits
            const fullDate = day + month + year;

            let total = 0;

            // Add each digit
            fullDate.split('').forEach(digit => {
                total += Number(digit);
            });

            // Reduce to life path number
            const lifePath = reduceNumber(total);

            document.getElementById('result').innerHTML =
                `Your Life Path Number is ${lifePath}`;
        }
    </script>

</body>

</html>
